<!-- templates/accounts/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BOM Costing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
        }

        .login-logo {
            width: 52px;
            height: 52px;
            background: #6366f1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin: 0 auto 20px;
        }

        .login-card h4 {
            font-weight: 700;
            color: #1a1f3a;
            text-align: center;
            margin-bottom: 6px;
        }

        .login-card p.subtitle {
            color: #6c757d;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-label {
            font-size: 0.825rem;
            font-weight: 500;
            color: #344054;
        }

        .form-control {
            border-radius: 8px;
            border-color: #e0e0e0;
            font-size: 0.9rem;
            padding: 10px 14px;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .btn-login {
            background: #6366f1;
            border: none;
            border-radius: 8px;
            width: 100%;
            padding: 11px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            margin-top: 4px;
            transition: background 0.2s;
        }

        .btn-login:hover { background: #4f46e5; color: #fff; }

        .alert {
            border-radius: 8px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <i class="bi bi-box-seam"></i>
        </div>

        <h4>BOM Costing System</h4>
        <p class="subtitle">Sign in to your account to continue</p>

        <!-- Error messages -->
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-circle me-2"></i>{{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

    </div>

    <p class="text-center mt-3" style="font-size:0.78rem;color:#aaa;">
        BOM Costing System &copy; {% now "Y" %}
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
